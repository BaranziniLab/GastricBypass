<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MetRS Network — Interactive Supplement (Fig. 2D, expanded)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --panel: #ffffff;
    --panel-border: #e6e6e6;
    --ink: #1c1c1e;
    --ink-soft: #555;
    --muted: #8a8a8e;
    --accent: #2c2c2e;
    --shadow: 0 6px 20px rgba(0,0,0,0.08);
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    overflow: hidden;
  }
  #app {
    position: fixed; inset: 0;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 56px 1fr;
    grid-template-areas:
      "header header"
      "stage  side";
  }
  header {
    grid-area: header;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-border);
    z-index: 5;
  }
  header h1 {
    font-size: 14px; margin: 0; font-weight: 600; letter-spacing: 0.01em;
  }
  header h1 .sub { color: var(--muted); font-weight: 400; margin-left: 8px; }
  header .ctrls {
    display: flex; gap: 6px; align-items: center;
  }
  header button {
    font-family: var(--sans); font-size: 12px;
    background: #f3f3f5; color: var(--ink);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  header button:hover { background: #ebebed; }
  header button:active { transform: translateY(1px); }
  #stage { grid-area: stage; position: relative; background: #ffffff; }
  svg { width: 100%; height: 100%; display: block; cursor: grab; }
  svg:active { cursor: grabbing; }
  .link {
    stroke: #c8ccd1;
    stroke-opacity: 0.55;
    stroke-width: 0.9;
    fill: none;
    transition: stroke-opacity 0.15s, stroke 0.15s, stroke-width 0.15s;
  }
  .link.dim { stroke-opacity: 0.07; }
  .link.hot { stroke: #1c1c1e; stroke-opacity: 0.85; stroke-width: 1.7; }
  .node circle {
    cursor: pointer;
    transition: filter 0.15s, opacity 0.15s;
  }
  .node circle.metrs { stroke-width: 2.2; }
  .node circle.normal { stroke-width: 0.9; }
  .node text {
    font-family: var(--sans);
    font-size: 9.5px;
    font-weight: 700;
    pointer-events: none;
    paint-order: stroke;
    stroke: #ffffff;
    stroke-width: 2.6px;
    stroke-linejoin: round;
  }
  .node text.italic { font-style: italic; }
  .node.dim circle { opacity: 0.18; }
  .node.dim text { opacity: 0.18; }
  .node.hot circle { filter: drop-shadow(0 0 4px rgba(0,0,0,0.35)); }

  /* Sidebar */
  aside {
    grid-area: side;
    background: var(--panel);
    border-left: 1px solid var(--panel-border);
    overflow: auto;
    display: flex; flex-direction: column;
  }
  .panel {
    padding: 16px 18px;
    border-bottom: 1px solid var(--panel-border);
  }
  .panel h2 {
    margin: 0 0 10px 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
  }
  .legend-row {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 0;
    font-size: 12.5px;
    cursor: pointer;
    user-select: none;
  }
  .legend-row .dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.2px solid #000;
    flex-shrink: 0;
  }
  .legend-row.off { opacity: 0.35; }
  .legend-row .count { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; font-size: 11.5px; }

  /* Detail panel */
  #detail {
    flex: 1;
    padding: 16px 18px;
    font-size: 12.5px;
    line-height: 1.5;
  }
  #detail .empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    margin-top: 30px;
  }
  #detail .title {
    font-size: 16px; font-weight: 700; margin-bottom: 2px;
    color: var(--ink); word-break: break-word;
  }
  #detail .title.italic { font-style: italic; }
  #detail .kicker {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  #detail dl {
    margin: 0; padding: 0;
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 6px 12px;
  }
  #detail dt {
    color: var(--muted); font-size: 11.5px;
    padding-top: 1px;
  }
  #detail dd {
    margin: 0;
    color: var(--ink);
    word-break: break-word;
  }
  #detail .pill {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    background: #f0f0f3;
    color: var(--ink-soft);
    font-size: 11px;
    border: 1px solid var(--panel-border);
  }
  #detail .pill.on { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
  #detail .neighbors {
    margin-top: 14px;
  }
  #detail .neighbors h3 {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 0 0 6px 0; font-weight: 600;
  }
  #detail .neighbors ul {
    list-style: none; padding: 0; margin: 0;
    max-height: 200px; overflow: auto;
  }
  #detail .neighbors li {
    font-size: 12px; padding: 3px 0;
    display: flex; gap: 7px; align-items: center;
    cursor: pointer;
  }
  #detail .neighbors li:hover { background: #f6f6f8; }
  #detail .neighbors li .ndot {
    width: 9px; height: 9px; border-radius: 50%; border: 1px solid #000;
    flex-shrink: 0;
  }
  #detail .neighbors li .nedge {
    color: var(--muted); font-size: 10.5px; margin-left: auto;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    background: rgba(28,28,30,0.96);
    color: #fff;
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 12px;
    line-height: 1.45;
    max-width: 320px;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity 0.12s ease-out;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .tooltip .tt-title.italic { font-style: italic; }
  .tooltip .tt-row { display: flex; gap: 10px; }
  .tooltip .tt-key { color: #aab; flex-shrink: 0; min-width: 78px; }
  .tooltip .tt-val { color: #fff; }
  .tooltip .tt-arrow { color: #aab; }

  /* Search */
  .search-wrap { padding: 12px 18px; border-bottom: 1px solid var(--panel-border); }
  .search-wrap input {
    width: 100%; box-sizing: border-box;
    font-family: var(--sans); font-size: 13px;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 7px 10px;
    background: #fafafa;
    outline: none;
  }
  .search-wrap input:focus { border-color: #1c1c1e; background: #fff; }

  /* Mobile fallback */
  @media (max-width: 820px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 56px 1fr 250px;
           grid-template-areas: "header" "stage" "side"; }
    aside { border-left: 0; border-top: 1px solid var(--panel-border); }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>MetRS Knowledge-Graph Network <span class="sub">Fig. 2D supplement · interactive</span></h1>
    <div class="ctrls">
      <button id="btn-recenter">Recenter</button>
      <button id="btn-restart">Re-simulate</button>
      <button id="btn-freeze">Freeze</button>
    </div>
  </header>
  <div id="stage">
    <svg id="net"></svg>
  </div>
  <aside>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search nodes…" />
    </div>
    <div class="panel">
      <h2>Node Type</h2>
      <div id="legend"></div>
    </div>
    <div id="detail">
      <div class="empty">Hover or click a node or edge to inspect its attributes.</div>
    </div>
  </aside>
</div>
<div class="tooltip" id="tooltip"></div>

false}, {"source": "Q86Y79", "target": "inchikey:XLYOFNOQVPJJNP-IGMARMGPSA-N", "source_name": "PTH", "target_name": "Oxygen-16 atom", "edge_type": "INTERACTS_PiC", "edge_type_label": "Protein\u2013compound interaction", "source_set": "Steiner-tree expansion", "is_ontology": false}, {"source": "Q86Y79", "target": "inchikey:QTBSBXVTEAMEQO-GUEYOVJQSA-N", "source_name": "PTH", "target_name": "(2H3)Acetic (2H)acid", "edge_type": "INTERACTS_PiC", "edge_type_label": "Protein\u2013compound interaction", "source_set": "Steiner-tree expansion", "is_ontology": false}, {"source": "Q9NUJ1", "target": "inchikey:LCTONWCANYUPML-VMIGTVKRSA-N", "source_name": "ABHDA", "target_name": "Pyruvic-13C3 acid", "edge_type": "INTERACTS_PiC", "edge_type_label": "Protein\u2013compound interaction", "source_set": "Steiner-tree expansion", "is_ontology": false}, {"source": "Q9NV66", "target": "inchikey:LCTONWCANYUPML-VMIGTVKRSA-N", "source_name": "TYW1", "target_name": "Pyruvic-13C3 acid", "edge_type": "INTERACTS_PiC", "edge_type_label": "Protein\u2013compound interaction", "source_set": "Steiner-tree expansion", "is_ontology": false}, {"source": "inchikey:SYEOWUNSTUDKGM-UHFFFAOYSA-N", "target": "CHEBI:189840", "source_name": "3-Methyladipic acid", "target_name": "dicarboxylic fatty acid", "edge_type": "ISA_CiC", "edge_type_label": "Compound subclass (is-a)", "source_set": "Steiner-tree expansion", "is_ontology": true}]}

<script>
(() => {
  const raw = JSON.parse(document.getElementById('payload').textContent);
  const nodes = raw.nodes.map(d => ({...d}));
  const edges = raw.edges.map(d => ({...d}));

  // Color map (matches R script)
  const COLOR = {
    Compound: '#E31A1C',
    Gene: '#1F78B4',
    Protein: '#33A02C',
    Pathway: '#FF7F00',
    BiologicalProcess: '#6A3D9A',
    Disease: '#FFD700'
  };
  const TYPE_LABEL = {
    Compound: 'Compound',
    Gene: 'Gene',
    Protein: 'Protein',
    Pathway: 'Pathway',
    BiologicalProcess: 'Biological Process',
    Disease: 'Disease'
  };
  const ORDER = ['Compound','Protein','Gene','Pathway','BiologicalProcess','Disease'];

  // darken hex by factor for label color (matches R darken_color factor=0.5)
  function darken(hex, f=0.5) {
    const r = Math.round(parseInt(hex.slice(1,3),16)*f);
    const g = Math.round(parseInt(hex.slice(3,5),16)*f);
    const b = Math.round(parseInt(hex.slice(5,7),16)*f);
    return '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  }

  // Build neighbor index
  const byId = new Map(nodes.map(n => [n.id, n]));
  const neighborMap = new Map(nodes.map(n => [n.id, []]));
  edges.forEach(e => {
    neighborMap.get(e.source).push({id: e.target, edge: e});
    neighborMap.get(e.target).push({id: e.source, edge: e});
  });

  // SVG setup
  const svg = d3.select('#net');
  const stage = document.getElementById('stage');
  let W = stage.clientWidth, H = stage.clientHeight;
  svg.attr('viewBox', [0,0,W,H]);

  const root = svg.append('g').attr('class','root');
  // group for links, nodes (nodes drawn after for z-order)
  const linkLayer = root.append('g').attr('class','links');
  const nodeLayer = root.append('g').attr('class','nodes');

  // Zoom/pan
  const zoom = d3.zoom()
    .scaleExtent([0.25, 5])
    .on('zoom', ev => root.attr('transform', ev.transform));
  svg.call(zoom);

  // Force simulation — tuned for stable, dispersed layout
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges)
      .id(d => d.id)
      .distance(d => 55 + (d.edge_type === 'ISA_CiC' ? 18 : 0))
      .strength(0.55))
    .force('charge', d3.forceManyBody().strength(-260).distanceMax(800))
    .force('center', d3.forceCenter(W/2, H/2).strength(0.03))
    .force('collide', d3.forceCollide().radius(d => d.r * 1.5 + 6).strength(0.9))
    .force('x', d3.forceX(W/2).strength(0.02))
    .force('y', d3.forceY(H/2).strength(0.02))
    .alpha(1)
    .alphaDecay(0.018)
    .velocityDecay(0.42);

  // Render links
  const link = linkLayer.selectAll('line')
    .data(edges)
    .join('line')
    .attr('class','link')
    .on('mouseenter', (ev, d) => showEdgeTooltip(ev, d))
    .on('mousemove', moveTooltip)
    .on('mouseleave', hideTooltip)
    .on('click', (ev, d) => { ev.stopPropagation(); selectEdge(d); });

  // Render nodes (group with circle + label)
  const node = nodeLayer.selectAll('g.node')
    .data(nodes, d => d.id)
    .join('g')
    .attr('class','node')
    .call(d3.drag()
      .on('start', (ev, d) => { if(!ev.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end', (ev, d) => { if(!ev.active) sim.alphaTarget(0); /* keep pinned */ }))
    .on('mouseenter', (ev, d) => { highlight(d); showNodeTooltip(ev, d); })
    .on('mousemove', moveTooltip)
    .on('mouseleave', () => { unhighlight(); hideTooltip(); })
    .on('click', (ev, d) => { ev.stopPropagation(); selectNode(d); })
    .on('dblclick', (ev, d) => { ev.stopPropagation(); d.fx = null; d.fy = null; sim.alpha(0.3).restart(); });

  node.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => COLOR[d.node_type] || '#999')
    .attr('stroke', '#000')
    .attr('class', d => d.is_metrs ? 'metrs' : 'normal')
    .attr('fill-opacity', 0.92);

  node.append('text')
    .attr('class', d => d.node_type === 'Gene' ? 'italic' : '')
    .attr('text-anchor', 'middle')
    .attr('dy', d => -d.r - 4)
    .attr('fill', d => darken(COLOR[d.node_type] || '#444'))
    .text(d => d.name);

  // Click outside to deselect
  svg.on('click', () => { selectedId = null; renderDetailEmpty(); unhighlight(); });

  sim.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Resize
  window.addEventListener('resize', () => {
    W = stage.clientWidth; H = stage.clientHeight;
    svg.attr('viewBox', [0,0,W,H]);
    sim.force('center', d3.forceCenter(W/2,H/2).strength(0.03));
    sim.force('x', d3.forceX(W/2).strength(0.02));
    sim.force('y', d3.forceY(H/2).strength(0.02));
    sim.alpha(0.3).restart();
  });

  // Controls
  document.getElementById('btn-recenter').onclick = () => {
    svg.transition().duration(450).call(zoom.transform, d3.zoomIdentity);
  };
  document.getElementById('btn-restart').onclick = () => {
    nodes.forEach(n => { n.fx = null; n.fy = null; });
    sim.alpha(0.9).restart();
  };
  let frozen = false;
  document.getElementById('btn-freeze').onclick = (ev) => {
    frozen = !frozen;
    if (frozen) {
      nodes.forEach(n => { n.fx = n.x; n.fy = n.y; });
      sim.stop();
      ev.target.textContent = 'Unfreeze';
    } else {
      nodes.forEach(n => { n.fx = null; n.fy = null; });
      sim.alpha(0.4).restart();
      ev.target.textContent = 'Freeze';
    }
  };

  // Legend
  const legend = d3.select('#legend');
  const counts = {};
  nodes.forEach(n => counts[n.node_type] = (counts[n.node_type]||0) + 1);
  const visibleTypes = new Set(ORDER.filter(t => counts[t]));

  function renderLegend() {
    legend.selectAll('.legend-row').remove();
    ORDER.filter(t => counts[t]).forEach(t => {
      const row = legend.append('div')
        .attr('class', 'legend-row' + (visibleTypes.has(t) ? '' : ' off'))
        .on('click', () => {
          if (visibleTypes.has(t)) visibleTypes.delete(t);
          else visibleTypes.add(t);
          applyVisibility();
          renderLegend();
        });
      row.append('span').attr('class','dot').style('background', COLOR[t]);
      row.append('span').text(TYPE_LABEL[t]);
      row.append('span').attr('class','count').text(counts[t]);
    });
  }
  renderLegend();

  function applyVisibility() {
    node.style('display', d => visibleTypes.has(d.node_type) ? null : 'none');
    link.style('display', d => (visibleTypes.has(d.source.node_type) && visibleTypes.has(d.target.node_type)) ? null : 'none');
  }

  // Search
  const searchEl = document.getElementById('search');
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) { unhighlight(); return; }
    const matches = new Set();
    nodes.forEach(n => {
      if (n.name.toLowerCase().includes(q) ||
          n.id.toLowerCase().includes(q) ||
          (n.functional_role || '').toLowerCase().includes(q) ||
          (n.subclass || '').toLowerCase().includes(q)) {
        matches.add(n.id);
      }
    });
    node.classed('hot', d => matches.has(d.id))
        .classed('dim', d => !matches.has(d.id));
    link.classed('dim', d => !(matches.has(d.source.id) && matches.has(d.target.id)));
  });

  // ---- Highlight on hover ----
  function highlight(d) {
    const conn = new Set([d.id]);
    neighborMap.get(d.id).forEach(n => conn.add(n.id));
    node.classed('dim', n => !conn.has(n.id))
        .classed('hot', n => n.id === d.id);
    link.classed('hot', e => e.source.id === d.id || e.target.id === d.id)
        .classed('dim', e => !(e.source.id === d.id || e.target.id === d.id));
  }
  function unhighlight() {
    if (selectedId) { highlight(byId.get(selectedId)); return; }
    node.classed('dim', false).classed('hot', false);
    link.classed('dim', false).classed('hot', false);
    if (searchEl.value.trim()) searchEl.dispatchEvent(new Event('input'));
  }

  // ---- Tooltip ----
  const tt = document.getElementById('tooltip');
  function fmtNum(x, p=3) { return (x === 0 || x) ? Number(x).toFixed(p).replace(/\.?0+$/,'') || '0' : '—'; }
  function showNodeTooltip(ev, d) {
    const cls = d.node_type === 'Gene' ? 'italic' : '';
    tt.innerHTML = `
      <div class="tt-title ${cls}">${escapeHtml(d.name)}</div>
      <div class="tt-row"><span class="tt-key">Type</span><span class="tt-val">${d.node_type_label}</span></div>
      ${d.subclass !== '—' ? `<div class="tt-row"><span class="tt-key">Subclass</span><span class="tt-val">${escapeHtml(d.subclass)}</span></div>` : ''}
      ${d.functional_role !== '—' ? `<div class="tt-row"><span class="tt-key">Role</span><span class="tt-val">${escapeHtml(d.functional_role)}</span></div>` : ''}
      <div class="tt-row"><span class="tt-key">MetRS</span><span class="tt-val">${d.is_metrs ? 'Yes — MetRS panel metabolite' : 'No'}</span></div>
      <div class="tt-row"><span class="tt-key">Source</span><span class="tt-val">${escapeHtml(d.source_set)}</span></div>
      <div class="tt-row"><span class="tt-key">Degree</span><span class="tt-val">${d.degree}</span></div>
      <div class="tt-row"><span class="tt-key">Betweenness</span><span class="tt-val">${fmtNum(d.betweenness, 4)}</span></div>
    `;
    tt.classList.add('show');
    moveTooltip(ev);
  }
  function showEdgeTooltip(ev, d) {
    tt.innerHTML = `
      <div class="tt-title">${escapeHtml(d.source_name)} <span class="tt-arrow">—</span> ${escapeHtml(d.target_name)}</div>
      <div class="tt-row"><span class="tt-key">Relation</span><span class="tt-val">${escapeHtml(d.edge_type_label)}</span></div>
      <div class="tt-row"><span class="tt-key">Code</span><span class="tt-val">${escapeHtml(d.edge_type)}</span></div>
      <div class="tt-row"><span class="tt-key">Source</span><span class="tt-val">${escapeHtml(d.source_set)}</span></div>
      <div class="tt-row"><span class="tt-key">Ontology</span><span class="tt-val">${d.is_ontology ? 'Yes' : 'No'}</span></div>
    `;
    tt.classList.add('show');
    moveTooltip(ev);
  }
  function moveTooltip(ev) {
    const pad = 14;
    const tw = tt.offsetWidth, th = tt.offsetHeight;
    let x = ev.clientX + pad, y = ev.clientY + pad;
    if (x + tw > window.innerWidth - 10) x = ev.clientX - tw - pad;
    if (y + th > window.innerHeight - 10) y = ev.clientY - th - pad;
    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  }
  function hideTooltip() { tt.classList.remove('show'); }

  // ---- Detail panel ----
  let selectedId = null;
  function renderDetailEmpty() {
    document.getElementById('detail').innerHTML =
      '<div class="empty">Hover or click a node or edge to inspect its attributes.</div>';
  }
  function selectNode(d) {
    selectedId = d.id;
    highlight(d);
    const cls = d.node_type === 'Gene' ? 'title italic' : 'title';
    const neighbors = neighborMap.get(d.id);
    const detail = document.getElementById('detail');
    detail.innerHTML = `
      <div class="${cls}">${escapeHtml(d.name)}</div>
      <div class="kicker">${d.node_type_label} · degree ${d.degree}</div>
      <dl>
        <dt>Identifier</dt><dd><code style="font-family:var(--mono);font-size:11.5px;">${escapeHtml(d.id)}</code></dd>
        ${d.hmdb_id !== '—' ? `<dt>HMDB</dt><dd>${escapeHtml(d.hmdb_id)}</dd>` : ''}
        ${d.subclass !== '—' ? `<dt>Subclass</dt><dd>${escapeHtml(d.subclass)}</dd>` : ''}
        ${d.functional_role !== '—' ? `<dt>Functional role</dt><dd>${escapeHtml(d.functional_role)}</dd>` : ''}
        <dt>Source</dt><dd>${escapeHtml(d.source)}</dd>
        <dt>Source set</dt><dd>${escapeHtml(d.source_set)}</dd>
        <dt>MetRS panel</dt><dd><span class="pill ${d.is_metrs?'on':''}">${d.is_metrs?'Yes':'No'}</span></dd>
        <dt>Highlighted</dt><dd><span class="pill ${d.highlight?'on':''}">${d.highlight?'Yes':'No'}</span></dd>
        <dt>Compound hub</dt><dd><span class="pill ${d.is_compound_hub?'on':''}">${d.is_compound_hub?'Yes':'No'}</span></dd>
        <dt>Protein hub</dt><dd><span class="pill ${d.is_protein_hub?'on':''}">${d.is_protein_hub?'Yes':'No'}</span></dd>
        <dt>Topology hub</dt><dd><span class="pill ${d.is_topology_hub?'on':''}">${d.is_topology_hub?'Yes':'No'}</span></dd>
        <dt>Degree</dt><dd>${d.degree}</dd>
        <dt>Betweenness</dt><dd>${fmtNum(d.betweenness, 4)}</dd>
        <dt>Eigenvector</dt><dd>${fmtNum(d.eigenvector, 4)}</dd>
        <dt>PageRank</dt><dd>${fmtNum(d.pagerank, 4)}</dd>
        <dt>Combined</dt><dd>${fmtNum(d.combined_score, 4)}</dd>
      </dl>
      <div class="neighbors">
        <h3>Neighbors (${neighbors.length})</h3>
        <ul id="nlist"></ul>
      </div>
    `;
    const ul = document.getElementById('nlist');
    neighbors.sort((a,b) => byId.get(a.id).name.localeCompare(byId.get(b.id).name)).forEach(nb => {
      const nNode = byId.get(nb.id);
      const li = document.createElement('li');
      li.innerHTML = `<span class="ndot" style="background:${COLOR[nNode.node_type]}"></span>
        <span>${escapeHtml(nNode.name)}</span>
        <span class="nedge">${escapeHtml(nb.edge.edge_type_label)}</span>`;
      li.onclick = () => selectNode(nNode);
      ul.appendChild(li);
    });
  }
  function selectEdge(d) {
    selectedId = null;
    const detail = document.getElementById('detail');
    detail.innerHTML = `
      <div class="title">${escapeHtml(d.source_name)} → ${escapeHtml(d.target_name)}</div>
      <div class="kicker">${escapeHtml(d.edge_type_label)}</div>
      <dl>
        <dt>Relation</dt><dd>${escapeHtml(d.edge_type_label)}</dd>
        <dt>Code</dt><dd><code style="font-family:var(--mono);font-size:11.5px;">${escapeHtml(d.edge_type)}</code></dd>
        <dt>Source</dt><dd>${escapeHtml(d.source_set)}</dd>
        <dt>Ontology link</dt><dd><span class="pill ${d.is_ontology?'on':''}">${d.is_ontology?'Yes':'No'}</span></dd>
        <dt>From</dt><dd>${escapeHtml(d.source_name)} <span style="color:var(--muted)">(${escapeHtml(byId.get(d.source.id || d.source).node_type_label)})</span></dd>
        <dt>To</dt><dd>${escapeHtml(d.target_name)} <span style="color:var(--muted)">(${escapeHtml(byId.get(d.target.id || d.target).node_type_label)})</span></dd>
      </dl>
    `;
    link.classed('hot', e => e === d).classed('dim', e => e !== d);
    node.classed('dim', n => !(n.id === (d.source.id || d.source) || n.id === (d.target.id || d.target)));
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      .replaceAll('"','&quot;').replaceAll("'",'&#39;');
  }

  // Run a few warm-up ticks to give the user a partially-laid-out start
  for (let i = 0; i < 60; i++) sim.tick();
})();
</script>
</body>
</html>
